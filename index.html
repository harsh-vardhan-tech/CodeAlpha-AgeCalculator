<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Age Calculator</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🎂 Age Calculator</h1>

  <p>Enter your Date of Birth</p>

  <div class="input-box">

    <input type="number"
    id="day"
    placeholder="DD"
    min="1"
    max="31">

    <input type="number"
    id="month"
    placeholder="MM"
    min="1"
    max="12">

    <input type="number"
    id="year"
    placeholder="YYYY"
    min="1900"
    max="2026">

  </div>

  <button onclick="calculateAge()">
    Calculate Age
  </button>

  <button class="reset-btn"
  onclick="resetFields()">
    Reset
  </button>

  <p id="error"></p>

  <div class="result-box">

    <div class="card">
      <span id="years">0</span>
      <p>Years</p>
    </div>

    <div class="card">
      <span id="months">0</span>
      <p>Months</p>
    </div>

    <div class="card">
      <span id="days">0</span>
      <p>Days</p>
    </div>

  </div>

  <div class="extra-info">

    <p id="birthday"></p>

    <p id="weekday"></p>

  </div>

  <footer>
    Created by Harsh Vardhan
  </footer>

</div>

<script src="script.js"></script>

</body>
